services:
  go_to_japan_db:
    image: postgres:17-alpine
    container_name: go_to_japan_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - go_to_japan_db_data:/var/lib/postgresql/data

volumes:
  go_to_japan_db_data:
